<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LE CARNET DE LA GRAPPE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700&family=Montserrat:wght@300;600&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Montserrat', sans-serif; text-align: center; }
        .p { display: none; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .active { display: flex !important; }
        .logo { width: 180px; height: auto; margin: 30px auto; display: block; border: 1px solid #c5a059; padding: 10px; border-radius: 5px; }
        h1 { font-family: 'Bodoni Moda', serif; color: #c5a059; font-size: 1.8rem; margin: 10px 0; }
        .btn-google { background: white; color: #000; border: none; padding: 15px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div id="PAGE_AUTH" class="p active">
        <img src="https://i.servimg.com/u/f49/11/31/89/70/picsar10.jpg" class="logo">
        <h1>Le Carnet de la Grappe</h1>
        <button class="btn-google" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Se connecter avec Google
        </button>
    </div>

    <div id="PAGE_HOME" class="p">
        <img src="https://i.servimg.com/u/f49/11/31/89/70/picsar10.jpg" class="logo">
        <h1 id="userName">Ma Cave</h1>
        <p>Connexion réussie ! Vos vins apparaîtront ici.</p>
        <button onclick="logout()" style="color:gray; background:none; border:none; margin-top:40px;">Déconnexion</button>
    </div>

    <script>
        // TES PARAMÈTRES PERSONNELS (D'après tes photos Firebase)
        const firebaseConfig = {
            apiKey: "AIzaSyCoxRyIrC3xKKLhTt6nmJTFQ-54kNjCIQ8",
            authDomain: "le-carnet-de-la-grappe.firebaseapp.com",
            databaseURL: "https://le-carnet-de-la-grappe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "le-carnet-de-la-grappe",
            appId: "1:90122533942:web:0448a69951e95108ce6c97"
        };

        // Initialisation
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Fonction pour lancer la connexion Google
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        }

        function logout() { auth.signOut().then(() => window.location.reload()); }

        // Surveillance de la connexion
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('userName').innerText = "Cave de " + user.displayName;
                document.getElementById('PAGE_AUTH').classList.remove('active');
                document.getElementById('PAGE_HOME').classList.add('active');
            }
        });
    </script>
</body>
</html>
